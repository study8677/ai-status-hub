<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Services Official Status Monitor preview</title>
  <desc id="desc">A dashboard preview showing critical, warning, and operational AI service cards.</desc>
  <rect width="1200" height="630" fill="#f6f7f9"/>
  <rect x="70" y="62" width="1060" height="506" rx="18" fill="#ffffff" stroke="#d9dee7"/>
  <text x="110" y="128" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#18212f">AI 服务官方状态监控</text>
  <text x="110" y="166" font-family="Inter, Arial, sans-serif" font-size="20" fill="#657083">Official-source-first status dashboard for OpenAI, Claude, Gemini, Grok, and AWS</text>
  <g transform="translate(110 215)">
    <rect width="240" height="112" rx="10" fill="#fce8e6" stroke="#f4b7b1"/>
    <text x="22" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#b3261e">CRITICAL</text>
    <text x="22" y="78" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5f1b17">Claude / AWS</text>
  </g>
  <g transform="translate(380 215)">
    <rect width="240" height="112" rx="10" fill="#fff3dc" stroke="#f0c36d"/>
    <text x="22" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#b06000">WARN</text>
    <text x="22" y="78" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6f4600">OpenAI</text>
  </g>
  <g transform="translate(650 215)">
    <rect width="240" height="112" rx="10" fill="#e7f4ea" stroke="#9fd1aa"/>
    <text x="22" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#137333">OK</text>
    <text x="22" y="78" font-family="Inter, Arial, sans-serif" font-size="20" fill="#194d2b">Gemini / Grok</text>
  </g>
  <g transform="translate(920 215)">
    <rect width="150" height="112" rx="10" fill="#eceff3" stroke="#c9d1dc"/>
    <text x="22" y="42" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#5f6368">API</text>
    <text x="22" y="78" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4d5562">JSON</text>
  </g>
  <rect x="110" y="370" width="960" height="1" fill="#d9dee7"/>
  <text x="110" y="420" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#18212f">GitHub Actions + Pages</text>
  <text x="110" y="456" font-family="Inter, Arial, sans-serif" font-size="19" fill="#657083">5-minute hosted polling, static dashboard, JSON snapshots, NDJSON events, daily reports.</text>
  <text x="110" y="502" font-family="Inter, Arial, sans-serif" font-size="19" fill="#0b57d0">github.com/study8677/aistatues</text>
