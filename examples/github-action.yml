name: Consume AI status

on:
  workflow_dispatch:

jobs:
  read-status:
    runs-on: ubuntu-latest
    steps:
      - name: Read public snapshot
        run: |
          curl -s https://study8677.github.io/aistatues/last_run.json \
            | jq -r '.services[] | [.service, .level, .overall_status] | @tsv'
