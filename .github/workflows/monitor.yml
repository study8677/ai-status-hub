name: AI Status Hub Monitor

on:
  schedule:
    # GitHub Actions hosted runners support 5-minute cron granularity at best.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-status-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore monitor state from Pages branch
        run: |
          set -euo pipefail
          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout origin/gh-pages -- data output reports 2>/dev/null || true
          fi

      - name: Test parsers
        run: python3 -m unittest discover -s tests -v

      - name: Run monitor
        run: |
          python3 monitor.py run
          python3 monitor.py report

      - name: Prepare Pages payload
        run: |
          set -euo pipefail
          mkdir -p public/data public/output public/reports public/schema
          cp -f data/monitor.db public/data/monitor.db
          cp -f output/last_run.json public/output/last_run.json
          cp -f output/events.ndjson public/output/events.ndjson
          cp -f docs/schema/*.json public/schema/
          find reports -maxdepth 1 -type f -name 'daily-report-*' -exec cp -f {} public/reports/ \;

      - name: Publish dashboard and state
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
